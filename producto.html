<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrontEnd Store</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link href="https://fonts.googleapis.com/css2?family=Krub&family=Staatliches&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
</head>
<body>
    <header class="header">
        <a href="index.html">
            <img class="header__logo" src="img/logo.png" alt="Logo"></a>

    </header>

    <nav class="navegacion"> <!-- Navigation bar -->
        <a class="navegacion__enlace navegacion__enlace--activo" href="index.html">Tienda</a> 
        <a class="navegacion__enlace" href="nosotros.html">Nosotros</a>
    </nav>

    <main class="contenedor">
        <h1>React JS</h1>

        <div class="camisa"> 
            <img class="camisa__imagen" src="img/3.jpg" alt="imagen del producto">
            
            <div class="camisa__contenido"> 
                <p>Vivamus pulvinar quis tortor sed tincidunt. Sed est lectus, commodo et elementum ac, faucibus porttitor elit. Aenean dictum iaculis dui et blandit.</p>
            
                <form class="formulario">
                    <select class="formulario__campo">
                        <option disabled selected>Seleccionar Talle</option>
                        <option>Chica</option>
                        <option>Mediana</option>
                        <option>Grande</option>
                    </select>

                    <input class="formulario__campo"  type="number" placeholder="Cantidad" min="1"> 
                    <input class="formulario__submit" type="submit" value="Agregar al carrito">
                </form>
            
            </div>
                
            
        </div>
    </main>

    <footer class="footer">
        <p class="footer__texto">FrontEnd Store - Todos los derechos reservados</p>
    </footer>

</body>
</html>
